services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: memory_graph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.22
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  memory-graph-engine:
    build:
      context: ..
    command: npm run dev:memory
    environment:
      PORT: 8080
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/memory_graph
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - neo4j

volumes:
  postgres_data:
  neo4j_data:

